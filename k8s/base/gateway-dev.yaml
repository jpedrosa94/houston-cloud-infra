# Dev Gateway — HTTP-only, nip.io wildcard.
# Replace gateway.yaml in production with TLS + real domain.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: houston-gateway
  namespace: houston-system
spec:
  gatewayClassName: gke-l7-regional-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.nip.io"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              houston.ai/gateway-routes: "true"
