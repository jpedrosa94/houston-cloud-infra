# CORS policy for Envoy Gateway — allows browser cross-origin
# requests from any origin to tenant engines.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: tenant-cors
  namespace: houston-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: houston-gateway
  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowHeaders:
      - "*"
    exposeHeaders:
      - "*"
    maxAge: 86400s
